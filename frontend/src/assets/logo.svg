<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="url(#grad1)" />
  
  <!-- Snowflake/AC Symbol -->
  <g transform="translate(100,100)" fill="white">
    <!-- Center -->
    <circle cx="0" cy="0" r="12" fill="white"/>
    
    <!-- Snowflake arms -->
    <rect x="-4" y="-55" width="8" height="50" rx="4"/>
    <rect x="-4" y="-55" width="8" height="50" rx="4" transform="rotate(60)"/>
    <rect x="-4" y="-55" width="8" height="50" rx="4" transform="rotate(120)"/>
    
    <!-- Small dots -->
    <circle cx="0" cy="-40" r="4" fill="white"/>
    <circle cx="34.6" cy="-20" r="4" fill="white"/>
    <circle cx="34.6" cy="20" r="4" fill="white"/>
    <circle cx="0" cy="40" r="4" fill="white"/>
    <circle cx="-34.6" cy="20" r="4" fill="white"/>
    <circle cx="-34.6" cy="-20" r="4" fill="white"/>
  </g>
  
  <!-- Wrench -->
  <g transform="translate(100,100) rotate(-45)">
    <rect x="-8" y="50" width="16" height="45" rx="3" fill="#fbbf24"/>
    <rect x="-20" y="85" width="40" height="18" rx="4" fill="#fbbf24"/>
    <rect x="-15" y="92" width="10" height="8" fill="#0891b2"/>
    <rect x="5" y="92" width="10" height="8" fill="#0891b2"/>
  </g>
</svg>
