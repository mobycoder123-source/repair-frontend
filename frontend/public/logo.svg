<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#0369a1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" rx="20" fill="url(#bgGrad)"/>
  
  <!-- AC Unit Outer -->
  <rect x="45" y="55" width="110" height="70" rx="8" fill="#f8fafc"/>
  <rect x="45" y="55" width="110" height="20" rx="8" fill="#e2e8f0"/>
  
  <!-- AC Display -->
  <rect x="60" y="80" width="30" height="25" rx="3" fill="#0ea5e9"/>
  <text x="75" y="97" text-anchor="middle" fill="white" font-family="monospace" font-size="14" font-weight="bold">24°</text>
  
  <!-- AC Vents -->
  <g stroke="#64748b" stroke-width="2">
    <line x1="105" y1="80" x2="105" y2="110"/>
    <line x1="115" y1="80" x2="115" y2="110"/>
    <line x1="125" y1="80" x2="125" y2="110"/>
    <line x1="135" y1="80" x2="135" y2="110"/>
  </g>
  
  <!-- Power Button -->
  <circle cx="145" cy="100" r="8" fill="#22c55e"/>
  
  <!-- Snowflake Symbol -->
  <g transform="translate(75,65)" fill="#0ea5e9">
    <circle cx="0" cy="0" r="4"/>
    <rect x="-2" y="-12" width="4" height="10" rx="2"/>
    <rect x="-2" y="-12" width="4" height="10" rx="2" transform="rotate(90)"/>
  </g>
  
  <!-- Air Waves -->
  <path d="M55 95 Q45 100 55 105" stroke="white" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M40 90 Q30 100 40 110" stroke="white" stroke-width="2" fill="none" opacity="0.5"/>
  
  <!-- Text -->
  <text x="100" y="165" text-anchor="middle" fill="white" font-family="Arial Black" font-size="14" font-weight="bold">A/C REPAIR</text>
  <text x="100" y="180" text-anchor="middle" fill="#fef08a" font-family="Arial" font-size="10" font-weight="bold">SERVICE</text>
</svg>
